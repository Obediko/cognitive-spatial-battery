<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baseline Cognitive &amp; Spatial Battery</title>

  <!-- jsPsych 7 core browser bundle -->
  <script src="https://unpkg.com/jspsych@7.3.4/dist/index.browser.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" />

  <!-- jsPsych plugins (browser builds expose globals like jsPsychHtmlKeyboardResponse) -->
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3/dist/index.browser.min.js"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3/dist/index.browser.min.js"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3/dist/index.browser.min.js"></script>
  <script src="https://unpkg.com/@jspsych/plugin-fullscreen@1.2.1/dist/index.browser.min.js"></script>
  <script src="https://unpkg.com/@jspsych/plugin-instructions@1.1.4/dist/index.browser.min.js"></script>
  <script src="https://unpkg.com/@jspsych/plugin-call-function@1.1.3/dist/index.browser.min.js"></script>

  <!-- Battery CSS -->
  <link rel="stylesheet" href="css/style.css" />

  <style>
    /* Loading fallback - visible by default, hidden once JS starts */
    #loading-fallback {
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      color: #a8d8ea;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 1.1rem;
      text-align: center;
      padding: 2rem;
      z-index: 9998;
    }
    /* Small-screen warning - hidden by default, shown by JS */
    #small-screen-warning {
      display: none;
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      color: #e0e0e0;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 1.1rem;
      text-align: center;
      padding: 2rem;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <!-- Small-screen warning (JS controls visibility) -->
  <div id="small-screen-warning">
    <div>
      <p><strong>Screen too small</strong></p>
      <p>This battery requires a laptop or desktop monitor.</p>
      <p>Please switch to a larger device or maximise your browser window.</p>
      <p style="font-size:0.85rem;color:#8899aa;margin-top:0.6em">
        Current size: <span id="screen-dims">checking...</span>
      </p>
    </div>
  </div>

  <!-- Loading fallback (hidden once JS starts) -->
  <div id="loading-fallback">
    <div>
      <p>Loading battery...</p>
      <p style="font-size:0.85rem;color:#8899aa;margin-top:0.6em">
        If this message stays visible, JavaScript failed to load.<br>
        Open the browser console (F12) for details.
      </p>
    </div>
  </div>

  <!-- jsPsych renders into this div -->
  <div id="jspsych-target"></div>

  <!-- Utilities (data store, CSV/JSON export, math helpers) -->
  <script src="js/utils.js"></script>

  <!-- Task modules (must load before main.js) -->
  <script src="js/tasks/visual_sequencing_set_shifting.js"></script>
  <script src="js/tasks/object_location_memory.js"></script>
  <script src="js/tasks/spatial_pointing.js"></script>

  <!-- Main battery orchestration (loads last) -->
  <script src="js/main.js"></script>

</body>
</html>
